data-title="string": window title
data-hideheader: hide header
data-openway="openway": way to open window

<template id="template-welcome">
	<style>
	/* style paragraph */
	#welcome-window p {
		font-size: 1.5rem;
		margin-left: 5%;
		margin-right: 5%;
	}
	#welcome-window p:last-of-type {
		font-size: 1rem;
		text-align: right;
	}
	
	/* style title */
	#welcome-window .welcome-header {
		display: flex;
		align-items: center;
		justify-content: center;
		flex-direction: row;
		text-align: center;
		gap: 15px;
	}

	#welcome-window .welcome-header .welcome-title {
		font-size: 2.5rem;
		font-weight: bold;
		text-align: center;
		background-color: rgba(255,255,0,0.2);
		box-shadow: 0 0 10px rgba(255,255,0,0.3);
	}

	#welcome-window > section img {
		position: block;
		margin: 2%;
		width: 20%;
		transition: transform 3s ease;
	}

	#welcome-window > section img:hover {
		transform: rotate(90deg) scale(1.3);
	}

	/* Style links */
	#welcome-window a {
		color: #ffff00;
		text-decoration: none;
		font-weight: 500;
		transition: color 0.3s ease, transform 0.3s ease;
	}

	#welcome-window a:hover {
		color: #ff0000;
		transform: scale(1.05);
	}
	</style>
	<tos-window class="size-middle scrollable skin-in-orange" id="welcome-window" data-title="Welcome in TriangleOS!" data-openway="center" data-unicOpen>
		<div class="welcome-header">
			<div class="welcome-title">Welcome in TriangleOS!</div>
			<img src="assets/icons/gold_triangle.png" alt="TriangleOS Logo">
		</div>
		<p>
			<a href="https://github.com/AKtomik/triangleOS" target="_blank">TriangleOS</a> is a lightweight pseudo operating system UI for web.
		</p>
		<p>
			Documentation and tutorials can be found in the <a href="https://github.com/AKtomik/triangleOS" target="_blank">github README</a>. You can also experiment and edit this example page.
		</p>
		<p>
			If you have any problem, question or idea, feel free to open <a href="https://github.com/AKtomik/triangleOS/issues" target="_blank">an issue</a>!
		</p>
		<p>
			TriangleOS v1.1 by AKtomik
		</p>
	</tos-window>
</template>

<template id="template-tuto-content">
	<style>
			.gogle-container {
				margin: 0 10% 0 10%;
			}
		 .gogle-search {
			 	background-color: #4D5156;
				border-radius: 2em;
				padding: 0 10px 0 10px;
				font-size: .75em;
		 }
		 .gogle-result {
			max-width: 13em;
			margin-top: 1em;
		 }
		 .gogle-result-header {
		 	color: #99C3FF;
			font-size: .85em;
			margin: 0;
		 }
		 .gogle-result-lore {
		 	color: #ffffff;
			font-size: .5em;
			margin-top: .5em;
		 }

		@keyframes rainbow {
			0% { color: orange; }
			10% { color: purple;}  
			20% { color: red; }
			30% { color: CadetBlue; }
			40% { color: yellow; }
			50% { color: coral; }
			60% { color: green; }
			70% { color: cyan; }
			80% { color: DeepPink; }
			90% { color: DodgerBlue; }
			100% { color: orange; }
		}
	</style>
	<tos-window class="size-middle scrollable skin-in-black" data-title="Super cool content">
		<div class="gogle-container">
			<p class="gogle-search">
				🔍︎ what can I do in a window?
			</p>
			<div class="gogle-result">
				<h1 class="gogle-result-header">
					Pure HTML
				</h1>
				<p class="gogle-result-lore">
					TriangleOS support pure HTML, to build cool and simple window. There is a nice default style.
				</p>
			</div>
			<div class="gogle-result">
				<h1 class="gogle-result-header">
					Tweek with CSS
				</h1>
				<p class="gogle-result-lore">
					Use CSS to stylize your page. Of course by affecting your window content, but also by applying skins to windows.
				</p>
			</div>
			<div class="gogle-result">
				<h1 class="gogle-result-header">
					Energize with JS
				</h1>
				<p class="gogle-result-lore">
					You can interact with TriangleOS using JavaScript, to spawn window, edit them in real time, and more!
				</p>
			</div>
			<div class="gogle-result">
				<h1 class="gogle-result-header">
					Use iframe
				</h1>
				<p class="gogle-result-lore">
					You can use &#60;iframe&#62; inside of a window to display others website. But be aware, it works only if the website allow it.
				</p>
			</div>
		</div>
		</br>
		<p>
			A 
			<span style="color: #ffaa00;">window</span>
			can contain <i>any</i> <span style="color: #ff00ff;">HTML</span> content.
		</p>
		<p>
			It is a
			<span style="color: #fff; outline: #fff solid 1px;">container</span>
			like another, 
			<span style="color: #0f0;">is</span><span style="color: #f00;">n't </span>
			<span style="color: #ff0;">it</span>
			?
		</p>
		<p>
		 	Except it can also be 
			<span style="transform: scale(1, 2.5); display: inline-block; font-weight: bold;">resized</span>,	
			<span style="transform: translate(-5px, 30px); display: inline-block;">dragged</span>,	
			<span style="transform: scale(1, .5); display: inline-block;">minimized</span>...
		</p>
		<p style="text-align: center; font-weight: bold; margin: 10% 20% 10% 0; animation: rainbow 5s infinite;">
			Use window as you see fit!
		</p>
	</tos-window>
</template>

<template id="template-tuto-style">
	<tos-window class="size-middle scrollable" data-title="change style and size">
		<p>
			You can change a element size and skin by adding class.
		</p>
		<p>
			You can make it 
			<a onclick="TriangleOS.Window.parent(this).applySkin('skin-in-red', TriangleOS.Enum.SkinReplaceMode.ALL)">
			red
			</a>
			, 
			<a onclick="TriangleOS.Window.parent(this).applySkin('skin-in-purple', TriangleOS.Enum.SkinReplaceMode.ALL)">
			purple
			</a>
			 or 
			<a onclick="TriangleOS.Window.parent(this).applySkin('skin-in-transparent', TriangleOS.Enum.SkinReplaceMode.ALL)">
			transparent
			</a>
			or even 
			<a onclick="TriangleOS.Window.parent(this).applySkin('skin-in-deep', TriangleOS.Enum.SkinReplaceMode.NONE)">
			scary
			</a>
			.
		</p>
		<p>
			You can make it 
			<a onclick="TriangleOS.Window.parent(this).applySize('size-small', true)">
			small
			</a>
			, 
			<a onclick="TriangleOS.Window.parent(this).applySize('size-middle', true)">
			middle
			</a>
			 or 
			<a onclick="TriangleOS.Window.parent(this).applySize('size-big', true)">
			big 
			</a>
			or even 
			<a onclick="TriangleOS.Window.parent(this).applySize('size-full', true)">
			full
			</a>
			.
		</p>
	</tos-window>
</template>

<template id="template-tuto-skin">
	<tos-window class="size-middle scrollable skin-rainbow" data-title="custom skins">
		<h1>

		<p>
			There is a lot of defaults skins already aviable.
		</p>
		<p>
			But you can create your owns in tos-skin.css (auto imported) or in another CSS file.

<template id="template-tuto-super">
	<tos-window class="size-middle scrollable skin-top-glass skin-in-lightgray" data-title="powerfull skins">
		<h1>
			Skins are powerfull
		</h1>
		<p>
			Skins can also change the look of the window itself, by changing topbar and icons.
		</p>
		<p>
			You can override any default rule by adding skins!
		</p>
		<p>
			Wanna 
			<a onclick="(() => {
					let window = TriangleOS.Window.parent(this);
					window.clearSkins();

					let contentSkinList = TriangleOS.Catalog.skinCollection.in;
					let contentSkinRandom = contentSkinList[Math.floor(contentSkinList.length * Math.random())];
					TriangleOS.Window.parent(this).applySkin(contentSkinRandom, TriangleOS.Enum.SkinReplaceMode.NONE);

					let topSkinList = TriangleOS.Catalog.skinCollection.top;
					let topSkinRandom = topSkinList[Math.floor(topSkinList.length * Math.random())];
					TriangleOS.Window.parent(this).applySkin(topSkinRandom, TriangleOS.Enum.SkinReplaceMode.NONE);
				})()">
			see
			</a>
			?
		</p>
	</tos-window>
</template>
